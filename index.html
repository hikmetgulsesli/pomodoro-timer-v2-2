<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pomodoro Timer</title>
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
  <!-- Design Tokens CSS -->
  <link rel="stylesheet" href="src/design-tokens.css">
  <!-- Tailwind CDN -->
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "primary": "var(--color-primary)",
            "background-light": "var(--color-background-light)",
            "background-dark": "var(--color-background-dark)",
            "tomato": "var(--color-tomato)",
            "tomato-hover": "var(--color-tomato-hover)",
            "slate-blue": "var(--color-slate-blue)",
            "slate-blue-hover": "var(--color-slate-blue-hover)",
            "orange-pause": "var(--color-orange-pause)",
            "orange-pause-hover": "var(--color-orange-pause-hover)",
            "gray-reset": "var(--color-gray-reset)",
            "gray-reset-hover": "var(--color-gray-reset-hover)"
          },
          fontFamily: {
            "display": ["var(--font-display)", "sans-serif"],
            "body": ["var(--font-body)", "sans-serif"],
            "mono": ["var(--font-mono)", "monospace"]
          },
        },
      },
    }
  </script>
  <style>
    /* Responsive timer display using CSS custom properties */
    #timer-display {
      font-size: var(--timer-font-size-mobile);
    }
    
    @media (min-width: 640px) {
      #timer-display {
        font-size: var(--timer-font-size-tablet);
      }
    }
    
    @media (min-width: 1024px) {
      #timer-display {
        font-size: var(--timer-font-size-desktop);
      }
    }
  </style>
</head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen flex flex-col items-center justify-center">
  <div class="w-full max-w-2xl px-4 sm:px-6 lg:px-8 py-8 sm:py-10 lg:py-12 flex flex-col items-center gap-8 sm:gap-10 lg:gap-12">
    <header class="text-center">
      <h1 class="font-display text-3xl sm:text-4xl font-bold tracking-tight mb-2">Pomodoro Timer</h1>
    </header>

    <div class="flex flex-col items-center gap-6 sm:gap-8 w-full">
      <div id="session-type" class="text-tomato font-display text-xl sm:text-2xl font-bold tracking-widest uppercase" aria-label="Current session type">
        WORK
      </div>
      <div class="font-mono leading-none font-bold tracking-tighter text-slate-800 dark:text-slate-200" id="timer-display" aria-live="polite" aria-atomic="true" aria-label="Timer display">
        25:00
      </div>
      <div id="session-count" class="text-base sm:text-lg text-slate-600 dark:text-slate-400 font-medium" aria-label="Session count">
        Session 1 of 4
      </div>
    </div>

    <div class="flex items-center justify-center gap-4 sm:gap-6 mt-2 sm:mt-4">
      <button id="control-btn" aria-label="Start Timer" class="btn flex flex-col items-center justify-center gap-2 group focus:outline-none">
        <div class="btn-circle bg-slate-blue flex items-center justify-center text-white">
          <span id="control-btn-icon" class="material-symbols-outlined text-2xl sm:text-3xl ml-0.5">play_arrow</span>
        </div>
        <span id="control-btn-label" class="text-sm font-medium text-slate-blue transition-colors duration-200">Start</span>
      </button>

      <button id="reset-btn" aria-label="Reset Timer" class="btn flex flex-col items-center justify-center gap-2 group focus:outline-none">
        <div class="btn-circle bg-gray-reset flex items-center justify-center text-white">
          <span class="material-symbols-outlined text-2xl sm:text-3xl">replay</span>
        </div>
        <span class="text-sm font-medium text-gray-reset">Reset</span>
      </button>
    </div>
  </div>

  <script src="dist/main.js"></script>
</body>
</html>
