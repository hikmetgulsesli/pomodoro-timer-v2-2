<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pomodoro Timer</title>
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
  <!-- Design Tokens CSS -->
  <link rel="stylesheet" href="src/design-tokens.css">
  <!-- Tailwind CDN -->
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "primary": "var(--color-primary)",
            "background-light": "var(--color-background-light)",
            "background-dark": "var(--color-background-dark)",
            "tomato": "var(--color-tomato)",
            "slate-blue": "var(--color-slate-blue)",
            "orange-pause": "var(--color-orange-pause)",
            "gray-reset": "var(--color-gray-reset)"
          },
          fontFamily: {
            "display": ["var(--font-display)", "sans-serif"],
            "body": ["var(--font-body)", "sans-serif"],
            "mono": ["var(--font-mono)", "monospace"]
          },
        },
      },
    }
  </script>
</head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen flex flex-col items-center justify-center">
  <div class="w-full max-w-2xl px-6 py-12 flex flex-col items-center gap-12">
    <header class="text-center">
      <h1 class="font-display text-4xl font-bold tracking-tight mb-2">Pomodoro Timer</h1>
    </header>

    <div class="flex flex-col items-center gap-8 w-full">
      <div id="session-type" class="text-tomato font-display text-2xl font-bold tracking-widest uppercase">
        WORK
      </div>
      <div class="font-mono text-[80px] leading-none font-bold tracking-tighter text-slate-800 dark:text-slate-200" id="timer-display">
        25:00
      </div>
      <div id="session-count" class="text-lg text-slate-600 dark:text-slate-400 font-medium">
        Session 1 of 4
      </div>
    </div>

    <div class="flex items-center justify-center gap-6 mt-4">
      <button id="control-btn" aria-label="Start Timer" class="flex flex-col items-center justify-center gap-2 group hover:opacity-80 transition-opacity focus:outline-none focus-visible:ring-2 focus-visible:ring-primary focus-visible:ring-offset-2 rounded-lg cursor-pointer">
        <div class="w-16 h-16 rounded-full bg-slate-blue flex items-center justify-center text-white shadow-sm transition-colors duration-200">
          <span id="control-btn-icon" class="material-symbols-outlined text-3xl ml-1">play_arrow</span>
        </div>
        <span id="control-btn-label" class="text-sm font-medium text-slate-blue transition-colors duration-200">Start</span>
      </button>

      <button id="reset-btn" aria-label="Reset Timer" class="flex flex-col items-center justify-center gap-2 group hover:opacity-80 transition-opacity focus:outline-none focus-visible:ring-2 focus-visible:ring-primary focus-visible:ring-offset-2 rounded-lg cursor-pointer">
        <div class="w-16 h-16 rounded-full bg-gray-reset flex items-center justify-center text-white shadow-sm">
          <span class="material-symbols-outlined text-3xl">replay</span>
        </div>
        <span class="text-sm font-medium text-gray-reset">Reset</span>
      </button>
    </div>
  </div>

  <script src="dist/main.js"></script>
</body>
</html>
