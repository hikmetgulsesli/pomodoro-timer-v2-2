<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Pomodoro Timer Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&amp;family=DM+Sans:wght@400;500;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#137fec",
                        "background-light": "#FAF9F6",
                        "background-dark": "#101922",
                        "tomato": "#E74C3C",
                        "slate-blue": "#5D6D7E",
                        "orange-pause": "#F39C12",
                        "gray-reset": "#95A5A6"
                    },
                    fontFamily: {
                        "display": ["Space Grotesk", "sans-serif"],
                        "body": ["DM Sans", "sans-serif"],
                        "mono": ["SF Mono", "Consolas", "monospace"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
</head>
<body class="bg-background-light dark:bg-background-dark font-body text-slate-900 dark:text-slate-100 min-h-screen flex flex-col items-center justify-center">
<div class="w-full max-w-2xl px-6 py-12 flex flex-col items-center gap-12">
<header class="text-center">
<h1 class="font-display text-4xl font-bold tracking-tight mb-2">Pomodoro Timer</h1>
</header>
<div class="flex flex-col items-center gap-8 w-full">
<div class="text-tomato font-display text-2xl font-bold tracking-widest uppercase">
                WORK
            </div>
<div class="font-mono text-[80px] leading-none font-bold tracking-tighter text-slate-800 dark:text-slate-200">
                25:00
            </div>
<div class="text-lg text-slate-600 dark:text-slate-400 font-medium">
                Session 1 of 4
            </div>
</div>
<div class="flex items-center justify-center gap-6 mt-4">
<button aria-label="Start Timer" class="flex flex-col items-center justify-center gap-2 group hover:opacity-80 transition-opacity focus:outline-none">
<div class="w-16 h-16 rounded-full bg-slate-blue flex items-center justify-center text-white shadow-sm">
<span class="material-symbols-outlined text-3xl ml-1">play_arrow</span>
</div>
<span class="text-sm font-medium text-slate-blue">Start</span>
</button>
<button aria-label="Pause Timer" class="flex flex-col items-center justify-center gap-2 group hover:opacity-80 transition-opacity focus:outline-none">
<div class="w-16 h-16 rounded-full bg-orange-pause flex items-center justify-center text-white shadow-sm">
<span class="material-symbols-outlined text-3xl">pause</span>
</div>
<span class="text-sm font-medium text-orange-pause">Pause</span>
</button>
<button aria-label="Reset Timer" class="flex flex-col items-center justify-center gap-2 group hover:opacity-80 transition-opacity focus:outline-none">
<div class="w-16 h-16 rounded-full bg-gray-reset flex items-center justify-center text-white shadow-sm">
<span class="material-symbols-outlined text-3xl">replay</span>
</div>
<span class="text-sm font-medium text-gray-reset">Reset</span>
</button>
</div>
</div>
</body></html>
